name: CI

on:
  push:
  pull_request:

jobs:
  tests:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: kalshi_weather_model
    env:
      ALLOW_LIVE_TRADING: "0"
      KALSHI_API_KEY: ""
      KALSHI_RSA_KEY_PATH: ""
      KALSHI_RSA_PRIVATE_KEY: ""
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: kalshi_weather_model/requirements.txt

      - name: Install dependencies
        run: python -m pip install --upgrade pip && python -m pip install -r requirements.txt

      - name: Compile package
        run: python -m compileall -q weather_arb tests

      - name: Run tests
        run: python -m pytest -q
